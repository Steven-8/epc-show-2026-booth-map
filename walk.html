<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>EPC Show 2026 · 逛展助手</title>
<style>
  :root{--bg:#0b0f17;--panel:#131a26;--panel2:#1a2333;--line:#2a3547;--ink:#e8eef7;
        --muted:#90a2bd;--accent:#36d399;--accent2:#3b82f6;--gold:#ffcf45;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font-family:"PingFang SC","Microsoft YaHei",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;font-size:15px}
  a{color:var(--accent)}
  header{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,#0c111b,#0b0f17);
    border-bottom:1px solid var(--line);padding:max(10px,env(safe-area-inset-top)) 12px 10px;
    display:flex;flex-direction:column;gap:9px}
  .htop{display:flex;align-items:center;gap:10px}
  .htop h1{font-size:16px;margin:0;flex:1;line-height:1.2}
  .htop h1 small{display:block;font-size:10.5px;color:var(--muted);font-weight:400;margin-top:1px}
  .prog{font-size:11px;color:var(--muted);background:var(--panel2);border:1px solid var(--line);
    border-radius:20px;padding:5px 10px;white-space:nowrap}
  .prog b{color:var(--accent)}
  .hbtn{background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:9px;
    padding:8px 11px;font-size:13px;cursor:pointer;white-space:nowrap}
  .search{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:10px;
    padding:11px 12px;color:var(--ink);font-size:16px;outline:none}
  .chips{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
  .chips button,.chips select{background:var(--panel2);border:1px solid var(--line);color:var(--muted);
    border-radius:20px;padding:7px 12px;font-size:12.5px;cursor:pointer;outline:none}
  .chips button.on{background:var(--accent2);color:#fff;border-color:var(--accent2)}
  main{padding:10px 10px 60px;max-width:760px;margin:0 auto}
  .wcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden}
  .wcard.done{opacity:.62}
  .whead{display:flex;align-items:center;gap:11px;padding:12px 12px;cursor:pointer}
  .wvisit{width:22px;height:22px;flex:0 0 auto;accent-color:var(--accent)}
  .wtitle{flex:1;min-width:0}
  .wname{font-size:15.5px;font-weight:700;display:block;line-height:1.2}
  .wname .star{color:var(--gold)}
  .wbooth{font-size:11.5px;color:var(--muted);margin-top:2px;display:block}
  .wtag{font-size:9.5px;font-weight:700;color:#fff;padding:2px 7px;border-radius:20px;flex:0 0 auto}
  .tag-OEM{background:#3b82f6}.tag-MRO{background:#f59e0b}.tag-Design{background:#10b981}.tag-Packaging{background:#ec4899}.tag-Other{background:#5a6b86}
  .wcaret{color:#5a6b86;font-size:13px;flex:0 0 auto;transition:.2s}
  .wcard.open .wcaret{transform:rotate(180deg)}
  .wbody{display:none;padding:0 13px 14px;border-top:1px solid var(--line)}
  .wcard.open .wbody{display:block}
  .wdo{font-size:12.5px;color:#cdd9ea;line-height:1.55;margin:11px 0 4px}
  .wnote-rel{font-size:11.5px;color:#ffcf9a;background:rgba(255,160,60,.07);border:1px solid rgba(255,160,60,.2);
    border-radius:8px;padding:7px 10px;margin:4px 0 6px}
  .wlinks{display:flex;gap:14px;margin:8px 0 2px;font-size:12.5px}
  .wsec{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--muted);margin:15px 0 7px;text-transform:uppercase}
  .wq{display:flex;gap:9px;align-items:flex-start;padding:8px 10px;background:var(--panel2);
    border:1px solid var(--line);border-radius:9px;margin-bottom:7px;font-size:13px;line-height:1.45;cursor:pointer}
  .wq input{width:18px;height:18px;flex:0 0 auto;margin-top:1px;accent-color:var(--accent)}
  .wq.checked span{text-decoration:line-through;color:var(--muted)}
  .wnote{width:100%;min-height:74px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;
    padding:11px;color:var(--ink);font-size:15px;outline:none;resize:vertical;font-family:inherit;line-height:1.5}
  .wnote:focus{border-color:var(--accent2)}
  .wcam{display:inline-flex;align-items:center;gap:7px;background:var(--accent2);color:#fff;border:0;
    border-radius:10px;padding:11px 15px;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px}
  .wgal{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .wgal img{width:74px;height:74px;object-fit:cover;border-radius:9px;border:1px solid var(--line);cursor:pointer}
  .wint{margin-top:13px;background:transparent;border:1px solid var(--line);color:var(--muted);
    border-radius:10px;padding:10px 14px;font-size:13.5px;cursor:pointer;width:100%}
  .wint.on{background:rgba(255,207,69,.13);border-color:var(--gold);color:var(--gold);font-weight:700}
  /* lightbox */
  #lb{position:fixed;inset:0;z-index:50;background:rgba(4,7,12,.94);display:none;flex-direction:column;
    align-items:center;justify-content:center;padding:16px}
  #lb.on{display:flex}
  #lb img{max-width:100%;max-height:78vh;border-radius:8px}
  #lb .lbbtns{display:flex;gap:12px;margin-top:16px}
  #lb button{background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:10px;
    padding:11px 18px;font-size:14px;cursor:pointer}
  #lb button.del{background:#3a1620;border-color:#7a2434;color:#ff9aa8}
  .empty{color:var(--muted);text-align:center;padding:40px 16px;font-size:14px}
  .tip{font-size:11px;color:#5d6b82;text-align:center;padding:4px 10px 12px;line-height:1.5}
</style>
</head>
<body>
<header>
  <div class="htop">
    <h1>EPC Show 2026 · 逛展助手<small>2026-06-16/17 · George R. Brown, Houston · 航改燃机项目对接</small></h1>
    <span class="prog" id="prog">0/0</span>
    <button class="hbtn" id="export">导出</button>
  </div>
  <input class="search" id="q" placeholder="搜索公司 / 展位号…">
  <div class="chips">
    <button data-f="all" class="on">全部</button>
    <button data-f="gt">🔥 燃机相关</button>
    <button data-f="int">⭐ 感兴趣</button>
    <button data-f="todo">未访问</button>
    <button data-f="done">已访问</button>
    <select id="catf"><option value="">全部类型</option></select>
    <select id="sortf"><option value="booth">按展位号</option><option value="name">按公司名</option></select>
  </div>
</header>

<main id="list"></main>
<div class="tip">笔记与照片只保存在本机浏览器（不会上传）。建议加到主屏/收藏；逛完用右上"导出"保存笔记。</div>

<div id="lb"><img id="lbimg"><div class="lbbtns"><button class="del" id="lbdel">删除照片</button><button id="lbclose">关闭</button></div></div>

<script src="walk.js"></script>
<script>
const WALK = (window.WALK||[]).slice();
const CATLABEL={OEM:'OEM 设备',MRO:'MRO 维修/服务',Design:'设计 / EPC',Packaging:'成撬 / 打包',Other:'其他'};
const SKEY='epcwalk_state_v1';
let state=JSON.parse(localStorage.getItem(SKEY)||'{}');
function save(){localStorage.setItem(SKEY,JSON.stringify(state));}
function st(slug){return state[slug]||(state[slug]={visited:false,interested:false,notes:'',asked:{}});}

/* ---------- IndexedDB for photos ---------- */
function idb(){return new Promise((res,rej)=>{const r=indexedDB.open('epcwalk',1);
  r.onupgradeneeded=e=>{const d=e.target.result; if(!d.objectStoreNames.contains('photos')){
    const s=d.createObjectStore('photos',{keyPath:'id',autoIncrement:true}); s.createIndex('slug','slug');}};
  r.onsuccess=e=>res(e.target.result); r.onerror=()=>rej(r.error);});}
async function addPhoto(slug,img){const d=await idb();return new Promise((res,rej)=>{
  const tx=d.transaction('photos','readwrite');tx.objectStore('photos').add({slug,ts:Date.now(),img});
  tx.oncomplete=res;tx.onerror=()=>rej(tx.error);});}
async function getPhotos(slug){const d=await idb();return new Promise(res=>{const out=[];
  const idx=d.transaction('photos','readonly').objectStore('photos').index('slug');
  idx.openCursor(IDBKeyRange.only(slug)).onsuccess=e=>{const c=e.target.result;
    if(c){out.push(Object.assign({id:c.primaryKey},c.value));c.continue();}else res(out);};});}
async function delPhoto(id){const d=await idb();return new Promise(res=>{
  const tx=d.transaction('photos','readwrite');tx.objectStore('photos').delete(id);tx.oncomplete=res;});}
function compress(file){return new Promise(res=>{const fr=new FileReader();
  fr.onload=()=>{const img=new Image();img.onload=()=>{const max=1280;let w=img.width,h=img.height;
    const sc=Math.min(1,max/Math.max(w,h));const c=document.createElement('canvas');
    c.width=Math.round(w*sc);c.height=Math.round(h*sc);c.getContext('2d').drawImage(img,0,0,c.width,c.height);
    res(c.toDataURL('image/jpeg',0.72));};img.src=fr.result;};fr.readAsDataURL(file);});}

/* ---------- render ---------- */
const list=document.getElementById('list'), prog=document.getElementById('prog');
const catf=document.getElementById('catf'), sortf=document.getElementById('sortf'), qIn=document.getElementById('q');
let filter='all', catv='', sortv='booth', text='';
[...new Set(WALK.map(w=>w.role))].forEach(c=>{if(!c)return;const o=document.createElement('option');o.value=c;o.textContent=CATLABEL[c]||c;catf.appendChild(o);});
function boothKey(s){const m=(s||'ZZ99').match(/^([A-Za-z]+)\s*0*(\d+)/);return m?[m[1].toUpperCase(),+m[2]]:['ZZ',999];}

function render(){
  let arr=WALK.filter(w=>{
    const s=st(w.slug);
    if(filter==='todo'&&s.visited)return false;
    if(filter==='done'&&!s.visited)return false;
    if(filter==='int'&&!s.interested)return false;
    if(filter==='gt'&&!(w.rel==='high'||w.rel==='med'))return false;
    if(catv&&w.role!==catv)return false;
    if(text){const t=(w.name+' '+(w.stand||'')+' '+(w.zone||'')).toLowerCase();if(!t.includes(text))return false;}
    return true;
  });
  arr.sort((a,b)=>{ if(sortv==='name')return a.name.localeCompare(b.name,'en');
    const ka=boothKey(a.stand),kb=boothKey(b.stand);return ka[0]<kb[0]?-1:ka[0]>kb[0]?1:ka[1]-kb[1];});
  const done=WALK.filter(w=>st(w.slug).visited).length;
  prog.innerHTML=`<b>${done}</b>/${WALK.length} 已访问`;
  list.innerHTML='';
  if(!arr.length){list.innerHTML='<div class="empty">没有匹配的公司</div>';return;}
  arr.forEach(w=>list.appendChild(card(w)));
}
function card(w){
  const s=st(w.slug);
  const el=document.createElement('div'); el.className='wcard'+(s.visited?' done':'');
  const qs=(w.questions||[]).map((q,i)=>`<label class="wq${s.asked[i]?' checked':''}"><input type="checkbox" data-q="${i}" ${s.asked[i]?'checked':''}><span>${esc(q)}</span></label>`).join('');
  el.innerHTML=`
    <div class="whead">
      <input type="checkbox" class="wvisit" ${s.visited?'checked':''} title="已访问">
      <div class="wtitle"><span class="wname">${esc(w.name)} ${s.interested?'<span class="star">★</span>':''}</span>
        <span class="wbooth">展位 ${esc(w.stand)} · 分区 ${esc(w.zone)}${(w.rel==='high'||w.rel==='med')?' · <b style="color:#ff9d4d">🔥燃机相关</b>':''}</span></div>
      <span class="wtag tag-${w.role||'Other'}">${w.role||'其他'}</span>
      <span class="wcaret">▾</span>
    </div>
    <div class="wbody">
      <div class="wdo">${esc(w.intro||'')}</div>
      ${w.note?`<div class="wnote-rel">🔧 与燃机项目：${esc(w.note)}</div>`:''}
      <div class="wlinks">${w.website?`<a href="${w.website}" target="_blank" rel="noopener">🌐 官网</a>`:''}${w.linkedin?`<a href="${w.linkedin}" target="_blank" rel="noopener">🔗 LinkedIn</a>`:''}</div>
      <div class="wsec">可以问的问题（点一下=已问）</div>
      ${qs||'<div style="color:var(--muted);font-size:12px">（暂无）</div>'}
      <div class="wsec">现场笔记</div>
      <textarea class="wnote" placeholder="记录对方回答、报价、联系人、跟进事项…">${esc(s.notes||'')}</textarea>
      <div class="wsec">照片</div>
      <label class="wcam">📷 拍照 / 加图片<input type="file" accept="image/*" capture="environment" multiple hidden></label>
      <div class="wgal"></div>
      <button class="wint ${s.interested?'on':''}">${s.interested?'★ 已标记感兴趣 / 跟进':'☆ 标记感兴趣 / 跟进'}</button>
    </div>`;
  // expand
  el.querySelector('.whead').addEventListener('click',e=>{ if(e.target.classList.contains('wvisit'))return;
    el.classList.toggle('open'); if(el.classList.contains('open'))loadGallery(w.slug,el); });
  // visited
  el.querySelector('.wvisit').addEventListener('change',e=>{s.visited=e.target.checked;save();el.classList.toggle('done',s.visited);
    prog.innerHTML=`<b>${WALK.filter(x=>st(x.slug).visited).length}</b>/${WALK.length} 已访问`;});
  // questions
  el.querySelectorAll('.wq input').forEach(cb=>cb.addEventListener('change',e=>{
    s.asked[e.target.dataset.q]=e.target.checked;save();e.target.closest('.wq').classList.toggle('checked',e.target.checked);}));
  // notes autosave
  const ta=el.querySelector('.wnote');
  ta.addEventListener('input',()=>{s.notes=ta.value;save();});
  // interest
  const ib=el.querySelector('.wint');
  ib.addEventListener('click',()=>{s.interested=!s.interested;save();ib.classList.toggle('on',s.interested);
    ib.textContent=s.interested?'★ 已标记感兴趣 / 跟进':'☆ 标记感兴趣 / 跟进';
    el.querySelector('.wname').innerHTML=esc(w.name)+(s.interested?' <span class="star">★</span>':'');});
  // photo
  const fi=el.querySelector('.wcam input');
  fi.addEventListener('change',async e=>{ for(const f of e.target.files){const d=await compress(f);await addPhoto(w.slug,d);} fi.value=''; loadGallery(w.slug,el);});
  return el;
}
async function loadGallery(slug,el){
  const gal=el.querySelector('.wgal'); if(!gal)return; const ph=await getPhotos(slug); gal.innerHTML='';
  ph.forEach(p=>{const im=document.createElement('img');im.src=p.img;im.onclick=()=>lightbox(p.id,p.img,slug,el);gal.appendChild(im);});
}
/* lightbox */
const lb=document.getElementById('lb'),lbimg=document.getElementById('lbimg');
let lbCtx=null;
function lightbox(id,src,slug,el){lbCtx={id,slug,el};lbimg.src=src;lb.classList.add('on');}
document.getElementById('lbclose').onclick=()=>lb.classList.remove('on');
document.getElementById('lbdel').onclick=async()=>{ if(lbCtx){await delPhoto(lbCtx.id);await loadGallery(lbCtx.slug,lbCtx.el);} lb.classList.remove('on');};
lb.addEventListener('click',e=>{if(e.target===lb)lb.classList.remove('on');});

/* filters */
qIn.addEventListener('input',e=>{text=e.target.value.trim().toLowerCase();render();});
catf.onchange=e=>{catv=e.target.value;render();};
sortf.onchange=e=>{sortv=e.target.value;render();};
document.querySelectorAll('.chips button[data-f]').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.chips button[data-f]').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');filter=b.dataset.f;render();scrollTo(0,0);});

/* export notes */
document.getElementById('export').onclick=()=>{
  let md=`# EPC Show 2026 逛展笔记\n\n`;
  WALK.slice().sort((a,b)=>{const ka=boothKey(a.stand),kb=boothKey(b.stand);return ka[0]<kb[0]?-1:ka[0]>kb[0]?1:ka[1]-kb[1];}).forEach(w=>{
    const s=st(w.slug); if(!s.visited&&!s.notes&&!s.interested&&!Object.values(s.asked||{}).some(Boolean))return;
    md+=`## ${w.name} — 展位 ${w.stand} (${w.role||''})${s.interested?' ⭐':''}${s.visited?' ✅已访问':''}\n`;
    const asked=(w.questions||[]).filter((q,i)=>s.asked[i]);
    if(asked.length)md+=`已问：${asked.map(q=>'「'+q+'」').join(' ')}\n`;
    if(s.notes)md+=`笔记：${s.notes}\n`;
    md+=`\n`;
  });
  const blob=new Blob([md],{type:'text/markdown'}); const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='EPC逛展笔记.md'; a.click();
};

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
if(!WALK.length){list.innerHTML='<div class="empty">数据加载中…（walk.js 未就绪）</div>';}
else render();
if(location.hash.includes('open')){const f=document.querySelector('.wcard');if(f)f.classList.add('open');}
</script>
</body>
</html>
